<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Echo - Connexion Serveur Autoritaire</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Image de fond depuis ton dossier assets/img */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('assets/img/background.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .logo-container img {
            max-width: 120px;
            height: auto;
            margin-bottom: 15px;
        }

        h2 {
            margin-bottom: 5px;
            font-size: 24px;
            color: #4CAF50;
        }

        .subtitle {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus {
            border-color: #4CAF50;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #4CAF50;
            color: white;
            font-weight: bold;
            font-size: 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #43a047;
        }

        #log {
            margin-top: 20px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            text-align: left;
            max-height: 120px;
            overflow-y: auto;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Emplacement de ton logo -->
    <div class="logo-container">
        <img src="assets/img/logo.png" alt="Echo Logo" onerror="this.style.display='none'">
    </div>

    <h2>Echo T-RPG</h2>
    <p class="subtitle">Portail d'Accès Sécurisé - Serveur Autoritaire</p>
    
    <input type="text" id="username" placeholder="Pseudo du joueur" value="HeroTactical">
    <input type="password" id="password" placeholder="Mot de passe" value="MonSuperMotDePasse">
    
    <button onclick="sendRegister()">S'inscrire / Connexion</button>
    
    <div id="log">État : Initialisation...</div>
</div>

<script>
    const logDiv = document.getElementById('log');

    function appendLog(message, isError = false) {
        logDiv.innerHTML += `<span style="color: ${isError ? '#ff5252' : '#81c784'}">${message}</span><br>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // Connexion WebSocket vers ton serveur distant Codespaces
    const serverUrl = 'wss://ubiquitous-succotash-5gp4949j4x6wc79p6-8080.app.github.dev';
    appendLog(`Connexion à ${serverUrl}...`);

    const ws = new WebSocket(serverUrl);

    ws.onopen = () => {
        appendLog("🟢 Connecté au serveur WebSocket !");
    };

    ws.onmessage = (event) => {
        try {
            const data = JSON.parse(event.data);
            appendLog(`📩 Réponse : ${JSON.stringify(data)}`);
        } catch (e) {
            appendLog(`📩 Données brutes : ${event.data}`);
        }
    };

    ws.onerror = (error) => {
        appendLog("🔴 Erreur de connexion au serveur (Vérifie le port public).", true);
    };

    ws.onclose = () => {
        appendLog("❌ Connexion fermée par le serveur.", true);
    };

    function sendRegister() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        if (!user || !pass) {
            appendLog("⚠️ Veuillez remplir tous les champs.", true);
            return;
        }

        const packet = {
            action: "register",
            username: user,
            password: pass
        };

        if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify(packet));
            appendLog(`📤 Envoi de l'inscription pour [${user}]...`);
        } else {
            appendLog("🔴 Impossible d'envoyer : Non connecté.", true);
        }
    }
</script>

</body>
</html>
