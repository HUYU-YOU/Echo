<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Echo T-RPG - Portail</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <video autoplay loop muted playsinline id="bg-video">
        <source src="CLIENT/assets/img/background.mp4" type="video/mp4">
    </video>

    <div class="logo-container">
        <img src="CLIENT/assets/img/logo.png" alt="Logo Echo" onerror="this.innerHTML='<h1 style=\'color:#d4af37; font-size: 40px; text-shadow: 0 4px 10px rgba(0,0,0,0.8);\'>ECHO</h1>'">
    </div>

    <div class="card">
        <div class="input-group">
            <span>👤</span>
            <input type="text" id="username" placeholder="Nom d'utilisateur (Pseudo)" autocomplete="off">
        </div>
        
        <div id="register-fields" style="display: none;">
            <div class="input-group">
                <span>📧</span>
                <input type="email" id="email" placeholder="Adresse e-mail" autocomplete="off">
            </div>
            <div class="input-group">
                <span>📅</span>
                <input type="date" id="dob" title="Date de naissance">
            </div>
        </div>

        <div class="input-group">
            <span>🔒</span>
            <input type="password" id="password" placeholder="Mot de passe">
        </div>
        
        <button id="main-btn" class="btn-primary" onclick="sendAction('login')">SE CONNECTER</button>
        <a href="#" id="forgot-link" class="link-forgot" onclick="return false;">Mot de passe oublié ?</a>
        <div class="divider">ou</div>
        <button id="secondary-btn" class="btn-secondary" onclick="toggleMode()">CRÉER UN COMPTE</button>
        
        <div id="log">État : Initialisation...</div>
    </div>

    <script src="client.js"></script>
</body>
</html>
