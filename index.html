<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo - Tactical RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="glass-panel">
        <h1>ECHO</h1>
        <h2>Rejoindre les serveurs</h2>
        
        <form id="registerForm">
            <input type="text" id="username" placeholder="Nom de compte (Pseudo)" required autocomplete="off">
            <input type="email" id="email" placeholder="Adresse e-mail" required autocomplete="off">
            
            <div class="date-container">
                <label for="dob">Date de naissance :</label>
                <input type="date" id="dob" required>
            </div>

            <input type="password" id="password" placeholder="Mot de passe" required>
            
            <button type="submit" id="registerBtn">CRÉER UN COMPTE</button>
        </form>
        
        <div id="statusMessage" class="status-message"></div>
    </div>

    <script src="client.js"></script>
</body>
</html>
