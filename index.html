<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Echo T-RPG - Connexion</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('CLIENT/assets/img/background.png') no-repeat center center fixed;
            background-size: cover;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(16, 22, 28, 0.92);
            border: 2px solid #5c4d33;
            padding: 35px 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .input-group {
            position: relative;
            margin: 15px 0;
        }

        .input-group span {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #8c8c8c;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background: rgba(10, 14, 18, 0.9);
            border: 1px solid #333b42;
            color: #fff;
            border-radius: 4px;
            font-size: 15px;
        }

        input:focus {
            border-color: #d4af37;
            outline: none;
            box-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(to bottom, #d4af37, #996515);
            color: #111;
            font-weight: bold;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid #ffdf73;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: linear-gradient(to bottom, #e6c550, #b37719);
            box-shadow: 0 6px 15px rgba(212,175,55,0.3);
        }

        .divider {
            margin: 20px 0;
            display: flex;
            align-items: center;
            text-align: center;
            color: #777;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #333b42;
        }

        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }

        .link-forgot {
            display: block;
            margin: 10px 0 5px 0;
            color: #9da5b0;
            font-size: 13px;
            text-decoration: none;
        }

        .link-forgot:hover { 
            color: #d4af37; 
            text-decoration: underline; 
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: rgba(25, 33, 41, 0.8);
            color: #c0c6cc;
            font-weight: 600;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #3a4654;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: rgba(35, 47, 59, 1);
            color: #fff;
            border-color: #5c6d80;
        }

        #log {
            margin-top: 20px;
            padding: 10px;
            background: rgba(5, 8, 12, 0.9);
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            text-align: left;
            max-height: 100px;
            overflow-y: auto;
            border: 1px solid #222;
            color: #7ec699;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="input-group">
        <span>👤</span>
        <input type="text" id="username" placeholder="Nom d'utilisateur" value="HeroTactical">
    </div>
    
    <div class="input-group">
        <span>🔒</span>
        <input type="password" id="password" placeholder="Mot de passe" value="MonSuperMotDePasse">
    </div>
    
    <button class="btn-primary" onclick="sendAction('login')">Se connecter</button>
    
    <a href="#" class="link-forgot" onclick="return false;">Mot de passe oublié ?</a>
    
    <div class="divider">ou</div>
    
    <button class="btn-secondary" onclick="sendAction('register')">Créer un compte</button>
    
    <div id="log">État : Initialisation de la connexion...</div>
</div>

<script>
    const logDiv = document.getElementById('log');

    function appendLog(message, isError = false) {
        logDiv.innerHTML += `<div style="color: ${isError ? '#ff5252' : '#7ec699'}">${message}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    const serverUrl = 'wss://ubiquitous-succotash-5gp4949j4x6wc79p6-8080.app.github.dev';
    const ws = new WebSocket(serverUrl);

    ws.onopen = () => {
        appendLog("🟢 Connecté au serveur WebSocket !");
    };

    ws.onmessage = (event) => {
        try {
            const data = JSON.parse(event.data);
            appendLog(`📩 Réponse : ${JSON.stringify(data)}`);
        } catch (e) {
            appendLog(`📩 Données : ${event.data}`);
        }
    };

    ws.onerror = () => {
        appendLog("🔴 Erreur de connexion au serveur.", true);
    };

    ws.onclose = () => {
        appendLog("❌ Déconnecté du serveur.", true);
    };

    function sendAction(actionType) {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        if (!user || !pass) {
            appendLog("⚠️ Remplissez tous les champs.", true);
            return;
        }

        const packet = {
            action: actionType,
            username: user,
            password: pass
        };

        if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify(packet));
            appendLog(`📤 Envoi [${actionType}] pour ${user}...`);
        } else {
            appendLog("🔴 Non connecté au serveur.", true);
        }
    }
</script>

</body>
</html>
